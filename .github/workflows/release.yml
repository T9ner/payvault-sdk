name: Release SDK

# Triggered when you push a version tag: git tag v0.3.0 && git push --tags
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # ── Run full test suite before publishing (safety gate) ──────────
  test:
    name: Test before release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: packages/sdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Run tests
        run: npm test

  # ── Publish to npm and create GitHub Release ─────────────────────
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: test   # Only runs if test job passes
    defaults:
      run:
        working-directory: packages/sdk

    # Required for creating GitHub Releases
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: packages/sdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build SDK
        run: npm run build

      # Publish to npm — requires NPM_TOKEN secret in repo Settings → Secrets
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Create a GitHub Release with auto-generated release notes
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            packages/sdk/dist/*
