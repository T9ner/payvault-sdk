name: Docker Build & Publish

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/payvault-api

jobs:
  build-and-push:
    name: Build & Push API Image
    runs-on: ubuntu-latest

    # Required for pushing to ghcr.io with GITHUB_TOKEN
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # Log in to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Extract metadata for tagging:
      # - :sha-<short-commit>  (e.g. sha-abc1234)
      # - :latest              (always points to most recent main build)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # Enable multi-platform builds and layer caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the image from apps/api/Dockerfile and push both tags
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in the GitHub registry to speed up subsequent builds
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

      - name: Image digest
        run: echo "Pushed ${{ steps.meta.outputs.tags }}"
